<!DOCTYPE html>
<html>

<head>
    <title>Solar Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Off-Grid Solar Panel Calculator</h1>
    <p>Enter your daily energy usage in Wh:</p>
    
    <input
        type="number"
        id="energy"
        placeholder="Example:12000"
    >

    <br><br>

    <label>Peak Sun Hours:</label><br>
    <input
    type="number"
    id="sunHours"
    placeholder="Example:5"
    step="0.1"
    >

    <br><br>

    <label>System Efficiency (%):</label><br>

    <input
    type="number"
    id="efficiency"
    placeholder="Example: 85"
    step="0.1"
    >

    
    <button onclick="calculate()">
        calculate solar system
    </button>

    <p id="result"></p>

    <script src="script.js"></script>

</body>



</html>
