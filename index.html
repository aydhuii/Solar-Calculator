<!DOCTYPE html>
<html>

<head>
    <title>Solar Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
    <h1>Off-Grid Solar Panel Calculator</h1>
    <h2>Load Information</h2>
    <p>Enter your daily energy usage in Wh:</p>
    
    <input
        type="number"
        id="energy"
        placeholder="Example:12000"
    >

    <br><br>
    <h2> Solar Information </h2>
    <label>Peak Sun Hours:</label><br>
    <input
    type="number"
    id="sunHours"
    placeholder="Example:5"
    step="0.1"
    >
    <br><br>
    <label>Solar Panel Wattage (W)</label><br>
    <input
        type="number"
        id="panelWattage"
        placeholder="Example: 450"
    >
    <br><br>

    <label>System Efficiency (%):</label><br>

    <input
    type="number"
    id="efficiency"
    placeholder="Example: 85"
    step="0.1"
    >

    <br><br>

    <label>Battery Voltage(V):</label><br>
   
    <input
    type="number"
    id="batteryVoltage"
    placeholder="Example: 48"
    >

    <br><br>

    <label>Depth of Discharge (%):</label><br>

    <input
    type="number"
    id="dod"
    placeholder="Example: 80"
    >

    <br><br>
    <h2>Battery Information</h2>

    <label>Battery Module Capacity (Wh)</label>
    
    <input
        type="number"
        id="batteryModule"
        placeholder="Example: 5120"
    >

    <br><br>

    <label># of Autonomy Days:</label><br>

    <input
    type="number"
    id="autonomy"
    placeholder="Example: 3"
    step="0.1"
    >

    <br><br>

    <button onclick="calculate()">
        Calculate Solar System
    </button>
    
    
    <h2>Results:</h2>
    
    <div class="result-card">
        <h3>Solar Array Size</h3>
        <p id="solarSize">--</p>
    </div>

    <div class="result-card">
        <h3>Solar Panels Required</h3>
        <p id="panelCount">--</p>
    </div>

    <div class="result-card">
        <h3>Battery Capacity</h3>
        <p id="batteryWh">--</p>
        <p id="batteryAh">--</p>
    </div>

    <div class="result-card">
        <h3>Battery Modules Required</h3>
        <p id="batteryCount">--</p>
    </div>

    <script src="script.js"></script>
</div>
</body>




</html>
